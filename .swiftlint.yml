# swiftlint.yml
swiftlint_version: 0.63.1

# By default, SwiftLint uses a set of sensible default rules you can adjust:
disabled_rules: # rule identifiers turned on by default to exclude from running
  - colon
  - comma
  - control_statement
  - blanket_disable_command
  - identifier_name

opt_in_rules: # some rules are turned off by default, so you need to opt-in
  - conditional_returns_on_newline # guard/if else { return } 
  - empty_count # find all the available rules by running: `swiftlint rules`
  - modifier_order
  - redundant_discardable_let
  - vertical_whitespace_closing_braces
# Alternatively, specify all rules explicitly by uncommenting this option:
# only_rules: # delete `disabled_rules` & `opt_in_rules` if using this
#   - empty_parameters
#   - vertical_whitespace
modifier_order:
  severity: warning
analyzer_rules: # rules run by `swiftlint analyze`
  - explicit_self

# If true, SwiftLint will not fail if no lintable files are found.
allow_zero_lintable_files: false

# If true, SwiftLint will treat all warnings as errors.
strict: false

# configurable rules can be customized from this configuration file
# binary rules can set their severity level
force_cast: warning # implicitly
force_try:
  severity: warning # explicitly
# rules that have both warning and error levels, can set just the warning level
# implicitly
line_length: 130
# they can set both implicitly with an array
type_body_length:
  - 300 # warning
  - 400 # error
# or they can set both explicitly
file_length:
  warning: 500
  error: 1200
# naming rules can set warnings/errors for min_length and max_length
# additionally they can set excluded names
type_name:
  min_length: 3 # only warning
  max_length: # warning and error
    warning: 40
    error: 50
  excluded: iPhone # excluded via string
  allowed_symbols: ["_"] # these are allowed in type names
identifier_name:
  min_length: # only min_length
    error: 5 # only error
  excluded: # excluded via string array
    - id
    - URL
    - GlobalAPIKey
reporter: "xcode" # reporter type (xcode, json, csv, checkstyle, codeclimate, junit, html, emoji, sonarqube, markdown, github-actions-logging, summary)
custom_rules:
  opening_brace_newline:
    name: "Opening Brace Newline"
    regex: '\{\s*[^\s}][^}]*\}'
    message: "New line after «{»"
    severity: warning
  double_space_between_modifiers:
    name: "No Double Spaces"
    regex: 'public {2,}|private {2,}|internal {2,}|final {2,}|static {2,}|let {2,}|var {2,}|func {2,}'
    message: "Avoid multiple spaces between modifiers and declarations"
    severity: warning
excluded:
  - Sources/Resources/Generated/NeedleGenerated.swift
  - Templates
